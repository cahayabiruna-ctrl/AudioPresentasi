<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentasi Audio Profesional - DVTEAM</title>
  <style>
    :root {
        --bg-dark: #0f172a;
        --primary-blue: #38bdf8;
        --accent-gold: #f59e0b;
        --text-light: #e2e8f0;
        --card-bg: #1e293b;
        --shadow-color: rgba(56, 189, 248, 0.1);
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-light);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
    }

    .presentation-container {
        width: 100%;
        max-width: 650px;
        margin: 20px;
        background: var(--card-bg);
        padding: 32px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2), 0 0 20px var(--shadow-color);
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
        position: relative;
        z-index: 10;
        cursor: pointer;
    }

    h1 {
        color: var(--text-light);
        font-size: 1.8rem;
        margin-top: 0;
    }

    h3 {
        color: var(--text-muted);
        font-weight: normal;
        margin-bottom: 24px;
    }

    .audio-visual {
        display: flex;
        justify-content: center;
        gap: 5px;
        margin-bottom: 20px;
        height: 40px;
        align-items: flex-end;
    }

    .eq-bar {
        width: 5px;
        background: linear-gradient(var(--primary-blue), var(--accent-gold));
        animation: equalize 1.5s infinite ease-in-out;
        border-radius: 2px;
    }
    
    .eq-bar:nth-child(even) { animation-delay: -0.5s; }
    .eq-bar:nth-child(3n) { animation-delay: -0.2s; }
    .eq-bar:nth-child(4n) { animation-delay: -0.8s; }

    @keyframes equalize {
        0% { transform: scaleY(0.1); }
        50% { transform: scaleY(1.0); }
        100% { transform: scaleY(0.1); }
    }

    audio {
        width: 100%;
        margin: 24px 0;
    }

    .timestamps {
        margin-top: 15px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .timestamps button {
        padding: 12px 20px;
        border: 1px solid var(--accent-gold);
        border-radius: 50px;
        background: transparent;
        color: var(--accent-gold);
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .timestamps button:hover {
        background: var(--accent-gold);
        color: var(--bg-dark);
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
    }

    .bubbles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: none;
    }
    
    .bubble {
        position: absolute;
        bottom: -150px;
        background: rgba(56, 189, 248, 0.1);
        border-radius: 50%;
        animation: rise 25s infinite;
        list-style: none;
    }

    @keyframes rise {
        0% {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        100% {
            transform: translateY(-1080px) scale(0);
            opacity: 0;
        }
    }
  </style>
</head>
<body>

  <ul class="bubbles" id="bubble-container"></ul>

  <div class="presentation-container" id="fullscreen-wrapper">
    <h1>🎧 Presentasi Konsep Bisnis Modern</h1>
    <div class="audio-visual">
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
    <h3>Oleh: Deka Sonjaya (DVTEAM)</h3>
    <audio id="presentation" controls>
      <source src="https://cahayabiruna-ctrl.github.io/AudioPresentasi/Presentasi-Bag1.mp3" type="audio/mpeg">
      Browser Anda tidak mendukung audio.
    </audio>
    <div class="timestamps">
      <button onclick="seek(18)">🎯 Impian Anda</button>
      <button onclick="seek(62)">⚠️ Tantangan Usaha</button>
      <button onclick="seek(77)">💡 Solusi Modern</button>
      <button onclick="seek(154)">🚀 Keunggulan</button>
      <button onclick="seek(183)">👉 Cara Memulai</button>
    </div>
  </div>

<script>
  function seek(seconds) {
    // Menghentikan propagasi agar tidak memicu fullscreen saat tombol diklik
    event.stopPropagation(); 
    const audioPlayer = document.getElementById('presentation');
    audioPlayer.currentTime = seconds;
    audioPlayer.play();
  }

  const fullscreenWrapper = document.getElementById('fullscreen-wrapper');
  let isFullscreenEnabled = false; // Penanda untuk memastikan fullscreen hanya sekali

  fullscreenWrapper.addEventListener('click', () => {
    if (!isFullscreenEnabled && !document.fullscreenElement) {
        fullscreenWrapper.requestFullscreen().catch(err => {
            console.log(`Error: ${err.message}`);
        });
        isFullscreenEnabled = true; // Set penanda setelah request
    }
  });

  // Mencegah audio player memicu fullscreen
  document.getElementById('presentation').addEventListener('click', function(event) {
    event.stopPropagation();
  });


  const bubbleContainer = document.getElementById('bubble-container');
  const bubbleCount = 20;

  for (let i = 0; i < bubbleCount; i++) {
    const bubble = document.createElement('li');
    bubble.classList.add('bubble');
    const size = Math.random() * 60 + 20;
    const duration = Math.random() * 10 + 15;
    const delay = Math.random() * 10;
    const position = Math.random() * 98;
    bubble.style.width = `${size}px`;
    bubble.style.height = `${size}px`;
    bubble.style.left = `${position}%`;
    bubble.style.animationDuration = `${duration}s`;
    bubble.style.animationDelay = `${delay}s`;
    bubbleContainer.appendChild(bubble);
  }
</script>

</body>
</html>
